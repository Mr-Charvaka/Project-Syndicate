<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serene Logic - Code Editor</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        surface: '#fbf9f6',
                        'on-surface': '#1b1c1a',
                        'on-surface-variant': '#464741',
                        'surface-container-lowest': '#ffffff',
                        'surface-container-low': '#f5f3f1',
                        'surface-container': '#efeeeb',
                        'surface-container-high': '#e9e8e5',
                        'outline-variant': '#c7c7bf',
                        primary: '#020302',
                        'on-primary': '#ffffff',
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --surface: #fbf9f6;
            --on-surface: #1b1c1a;
            --outline-variant: #c7c7bf;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--surface); color: var(--on-surface); }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20; }
        
        /* Sidebar Collapse Styles */
        nav { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), padding 0.3s; overflow-x: hidden; }
        .sidebar-collapsed { width: 70px !important; padding: 24px 12px !important; }
        .sidebar-collapsed .sidebar-text, .sidebar-collapsed .logo-subtitle { display: none; }
        .sidebar-collapsed h1 { font-size: 0px; }
        .sidebar-collapsed .nav-item { justify-content: center; padding: 8px !important; }
        .sidebar-collapsed .nav-item span:not(.material-symbols-outlined) { display: none; }
        
        #main-content { transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .content-collapsed { margin-left: 70px !important; }

        /* Shell Mode Overrides */
        body.in-shell #sidebar { display: none !important; }
        body.in-shell #main-content { margin-left: 0 !important; width: 100% !important; }

        #claw-iframe { background: var(--surface); }
    </style>
    <script>
        // Check for shell mode on load
        if (window.location.search.includes('shell=true')) {
            document.addEventListener('DOMContentLoaded', () => {
                document.body.classList.add('in-shell');
            });
        }
    </script>
</head>
<body class="bg-surface text-on-surface h-screen overflow-hidden flex">



    <!-- Main Content -->
    <main id="main-content" class="flex-1 flex flex-col h-full overflow-hidden transition-all duration-300 relative">
        <!-- Top App Bar -->
        <header class="h-16 flex items-center justify-between px-8 border-b border-outline-variant bg-surface-container-lowest shrink-0">
            <div class="flex items-center gap-4">
                <h2 class="text-lg font-bold">Autonomous Code Editor</h2>
                <button onclick="openWorkspace()" class="flex items-center gap-2 px-3 py-1.5 bg-surface-container-low hover:bg-surface-container-high rounded-lg text-sm transition-all border border-outline-variant">
                    <span class="material-symbols-outlined text-sm">folder_open</span>
                    Open Workspace
                </button>
            </div>
            <div class="flex items-center gap-4">
                <div class="relative group">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-sm">search</span>
                    <input type="text" placeholder="Search operations..." class="pl-10 pr-4 py-2 bg-surface-container-low border-none rounded-full text-sm focus:ring-1 focus:ring-primary w-64 transition-all">
                </div>
                <div class="flex items-center gap-2 text-[10px] font-bold text-on-surface-variant bg-surface-container px-3 py-1 rounded-full">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                    OPENCODE ACTIVE
                </div>
                <button onclick="location.reload()" class="p-2 hover:bg-surface-container-low rounded-lg transition-colors text-on-surface-variant" title="Reload Interface">
                    <span class="material-symbols-outlined text-[20px]">refresh</span>
                </button>
                <div class="w-8 h-8 rounded-full bg-surface-container-high border border-outline-variant flex items-center justify-center overflow-hidden">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="User">
                </div>
            </div>
        </header>

        <!-- Loading Overlay -->
        <div id="claw-loader" class="absolute inset-0 top-16 z-50 flex flex-col items-center justify-center bg-surface gap-4 transition-opacity duration-500">
            <div class="w-12 h-12 border-4 border-primary/10 border-t-primary rounded-full animate-spin"></div>
            <div class="flex flex-col items-center text-center">
                <h3 class="text-primary font-bold tracking-widest text-sm uppercase">Synchronizing Workspace</h3>
                <p class="text-on-surface-variant text-[10px] mt-1">Connecting to OpenCode mission environment...</p>
            </div>
        </div>

        <!-- Iframe Container -->
        <div class="flex-1 w-full h-full bg-surface relative">
            <iframe 
                id="claw-iframe"
                src="" 
                class="w-full h-full border-none opacity-0 transition-opacity duration-1000"
                title="Serene Claw Editor"
                allow="cross-origin-isolated; autoplay; clipboard-read; clipboard-write; camera; microphone; payment; usb; vr; accelerometer; gyroscope; magnetometer; midi; display-capture;"
            ></iframe>
        </div>
    </main>

    <script>
        const OPENCODE_UI_URL = "http://localhost:3000";
        
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const content = document.getElementById('main-content');
            const icon = document.getElementById('toggle-icon');
            
            sidebar.classList.toggle('sidebar-collapsed');
            content.classList.toggle('content-collapsed');
            
            if (sidebar.classList.contains('sidebar-collapsed')) {
                icon.innerText = 'menu';
            } else {
                icon.innerText = 'menu_open';
            }
        }

        function base64Encode(str) {
            // Standard base64 encoding for URL-safe transmission
            // Ensure we handle potential Unicode and normalize slashes for cross-platform compatibility
            return btoa(unescape(encodeURIComponent(str.replace(/\\/g, '/'))));
        }

        async function openWorkspace() {
            const result = await window.electron.ipcRenderer.invoke('open-workspace');
            if (result && result.path) {
                const encodedPath = base64Encode(result.path);
                const iframe = document.getElementById('claw-iframe');
                const loader = document.getElementById('claw-loader');
                
                // Show loader while switching
                loader.style.display = 'flex';
                loader.classList.remove('opacity-0');
                
                // Update iframe source
                iframe.src = `${OPENCODE_UI_URL}/${encodedPath}`;
                
                console.log("Navigating to workspace:", result.path, "Encoded:", encodedPath);
                
                // Re-trigger ready check for the new path
                checkOpenCodeReady();
            }
        }

        async function checkOpenCodeReady() {
            const loader = document.getElementById('claw-loader');
            const iframe = document.getElementById('claw-iframe');
            const statusText = loader.querySelector('p');
            
            // If already visible, don't restart everything, just ensure polling happens
            if (loader.style.display === 'none') {
                loader.style.display = 'flex';
                loader.classList.remove('opacity-0');
            }

            console.log("Polling OpenCode services...");
            
            const poll = async () => {
                try {
                    // Check UI (3000)
                    await fetch(OPENCODE_UI_URL, { mode: 'no-cors' });
                    console.log("OpenCode detected! Loading mission...");
                    statusText.innerText = "Environment synchronized. Finalizing UI...";
                    
                    // If iframe has no src yet, set it to the base URL
                    if (!iframe.src || iframe.src === 'about:blank') {
                        iframe.src = OPENCODE_UI_URL;
                    }
                    
                    // Delay slightly to ensure iframe starts loading
                    setTimeout(() => {
                        iframe.classList.remove('opacity-0');
                        loader.classList.add('opacity-0');
                        setTimeout(() => loader.style.display = 'none', 500);
                    }, 800);
                } catch (e) {
                    // Still waiting
                    setTimeout(poll, 1500);
                }
            };
            
            poll();
        }

        // Start polling on load
        window.onload = () => {
            checkOpenCodeReady();
            
            // Listen for Syndicate Missions
            window.electron.ipcRenderer.on('inject-mission', (event, mission) => {
                console.log("Syndicate Mission Received:", mission);
                const consoleDiv = document.createElement('div');
                consoleDiv.className = "fixed top-4 left-1/2 -translate-x-1/2 z-[1000] bg-black/90 text-white p-4 rounded-2xl border border-white/20 shadow-2xl flex flex-col gap-2 min-w-[400px] animate-bounce";
                consoleDiv.innerHTML = `
                    <div class="flex items-center gap-2 text-[10px] uppercase font-bold tracking-widest text-blue-400">
                        <span class="w-2 h-2 rounded-full bg-blue-400 animate-pulse"></span>
                        Active Syndicate Mission
                    </div>
                    <div class="text-sm font-medium">${mission}</div>
                    <div class="text-[10px] text-gray-400">Assigned to SDE Agent • Executing via Opencode</div>
                `;
                document.body.appendChild(consoleDiv);
                
                // Copy to clipboard for easy pasting into Opencode chat if needed
                navigator.clipboard.writeText(mission);
            });

            // Signal ready to receive mission
            window.electron.ipcRenderer.send('opencode-ready-for-mission');
        };
    </script>
</body>
</html>
